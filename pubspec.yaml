name: arrow_flow
description: Arrow Flow — a directional arrow puzzle game for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  flutter_bloc: ^8.1.6

  # Data & serialization
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.6.3

  # Audio
  audioplayers: ^6.1.0

  # Animations
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  confetti: ^0.7.0
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0

  # Ads & monetisation
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  # Storage
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Game services
  games_services: ^4.0.1

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.0.17

  # Utilities
  collection: ^1.19.1
  intl: ^0.20.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  hive_generator: ^2.0.1
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/levels/
    - assets/audio/arcade/
    - assets/audio/nature/
    - assets/audio/asmr/
    - assets/audio/scifi/
    - assets/audio/ambient/
    - assets/lottie/
    - assets/images/
